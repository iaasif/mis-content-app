@if(componentRef()) {
  <div class="flex items-center justify-center bg-gray-100">
    <div class="fixed inset-0 flex items-center justify-center bg-gray-800 bg-opacity-50">
      <div class=" relative rounded-lg bg-white p-6 shadow-lg" [ngStyle]="{'width': modalWidth()}">
        <div class="flex justify-end">
          <button type="button"
            #closeElem
            (click)="oncloseEvent()"
            class="size-8 inline-flex justify-center items-center gap-x-2 rounded-full border border-transparent bg-gray-100 text-gray-800 hover:bg-gray-200 focus:outline-none focus:bg-gray-200 disabled:opacity-50 disabled:pointer-events-none"
            aria-label="Close" data-hs-overlay="#hs-vertically-centered-scrollable-modal">
            <span class="sr-only">Close</span>
            <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 6 6 18"></path>
              <path d="m6 6 12 12"></path>
            </svg>
          </button>
        </div>
        <div class="px-6 pt-4 pb-6 overflow-y-auto scroll-smooth min-h-52">
          <ng-template *ngComponentOutlet="componentRef(); inputs: inputs()"></ng-template>
        </div>
      </div>
    </div>
  </div>
}
