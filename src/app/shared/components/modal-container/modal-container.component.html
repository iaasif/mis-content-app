<div id="hs-vertically-centered-scrollable-modal" 
  class="hs-overlay [--overlay-backdrop:static] hidden size-full fixed top-0 start-0 z-[80] overflow-x-hidden overflow-y-auto pointer-events-none"
  role="dialog" tabindex="-1" aria-labelledby="hs-vertically-centered-scrollable-modal-label">
  <div
    [ngClass]="attributes()['id'] === 'hs-small-modal' ? 'sm:max-w-lg sm:w-full' : 'lg:max-w-4xl lg:w-full'"
    class="hs-overlay-open:mt-7 hs-overlay-open:opacity-100 hs-overlay-open:duration-500 mt-0 opacity-0 ease-out transition-all sm:max-w-lg sm:w-full m-3 lg:mx-auto h-[calc(100%-3.5rem)] min-h-[calc(100%-3.5rem)] flex items-center">
    <div
      class="w-full max-h-full overflow-hidden mb-4 flex flex-col bg-white border shadow-sm rounded-xl pointer-events-auto">
      <div class="flex justify-end items-center px-4 border-b py-3">
        @if(inputs()['modalTitle']) {
          <h1 
            class="font-bold text-center flex-1 text-[#0e73a9]"
            [ngClass]="attributes()['id'] === 'hs-small-modal' ? 'text-lg' : 'text-2xl'">
            @if (inputs()['modalIcon']) {
             
              <div class="flex justify-center items-center mb-2">
                <span 
                  class=" bg-[#0e73a9] rounded-full p-3 flex justify-center items-center text-white text-4xl">
                  <i [ngClass]="inputs()['modalIcon']"></i>
                </span>
              </div>
            }
            <div class="text-center text-xl text-[#0e73a9] mt-2">
              {{ inputs()['modalTitle'] ? inputs()['modalTitle'] : '' }}
            </div>
          </h1>
        }
        <button type="button"
          #closeElem
          (click)="oncloseEvent()"
          class="size-8 inline-flex justify-center items-center gap-x-2 rounded-full border border-transparent bg-gray-100 text-gray-800 hover:bg-gray-200 focus:outline-none focus:bg-gray-200 disabled:opacity-50 disabled:pointer-events-none"
          aria-label="Close" data-hs-overlay="#hs-vertically-centered-scrollable-modal">
          <span class="sr-only">Close</span>
          <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        </button>
      </div>
      @if (componentRef()) {
        <div class="px-6 pt-4 pb-6 overflow-y-auto scroll-smooth min-h-52 relative">
          <ng-template *ngComponentOutlet="componentRef(); inputs: inputs()"></ng-template>
          @if (inputs()['feedBackLink']) {
            <div class="absolute top-1/3 left-[-30px]">
              <a 
              [href]="inputs()['feedBackLink']"
              target="_blank"
              type="button" 
              class="fixed rotate-90 text-xl bg-pink-400 text-white px-2 py-1 rounded-sm hover:bg-pink-600 opacity-40 hover:opacity-100">
                Feedback
              </a>
            </div>
          }
        </div>
      }
    </div>
  </div>
</div>
