<div class="upload-form max-w-96 mx-auto rounded-lg shadow-lg !border border-gray-300/70">
  <h4 class="text-lg">{{uploadTitle}}</h4>
  @if(!isPreview()) {
    <label for="file" (dragover)="handleDragOver($event)" (drop)="handleDrop($event)" class="p-4">
      <i class="ph ph-upload"></i>
      <img src="/images/img-upload.png" alt="">
      <span class="text-lg font-semibold">
        Drag & drop or
        <span>browse</span>
        your files
      </span>
    </label>
  
    <input id="file" type="file" name="file" (change)="onFileSelected($event)" [accept]="fileTypesToLimit"/>

   @if(outputBoxVisible){
    <div class="mt-4 bg-gray-100 p-3 rounded-lg">

      <p><strong>Size:</strong> {{ fileSize }}</p>
      <button type="button" (click)="cancel()" class="mt-2 bg-blue-500 text-white px-4 py-2 rounded">
        Upload
      </button>
    </div>
   }
