<div class="relative w-full">
  @if (label()) {
    <label class="mb-1.5 block text-sm font-semibold text-slate-700">
      {{ label() }}
    </label>
  }
  
  <div class="relative">
    <button
      type="button"
      (click)="toggleDropdown()"
      [disabled]="disabled()"
      [class]="disabled() ? 'cursor-not-allowed bg-slate-100' : 'cursor-pointer bg-white hover:border-slate-400'"
      class="flex w-full items-center justify-between rounded-lg border border-slate-300 px-4 py-2.5 text-left text-sm font-medium text-slate-700 shadow-sm transition focus:border-amber-500 focus:outline-none focus:ring-2 focus:ring-amber-500/20"
    >
      <span [class]="selectedOption() ? 'text-slate-900' : 'text-slate-500'">
        {{ selectedOption()?.label || placeholder() }}
      </span>
      
      <svg
        [class]="isOpen() ? 'rotate-180' : ''"
        class="h-4 w-4 text-slate-400 transition-transform duration-200"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
      </svg>
    </button>

    @if (isOpen()) {
      <div class="absolute z-50 mt-2 w-full overflow-hidden rounded-lg border border-slate-200 bg-white shadow-lg">
        <div class="max-h-60 overflow-y-auto">
          @for (option of options(); track option.value) {
            <button
              type="button"
              (click)="selectOption(option)"
              [disabled]="option.disabled"
              [class]="option.disabled ? 'cursor-not-allowed bg-slate-50 text-slate-400' : 'cursor-pointer hover:bg-amber-50'"
              class="flex w-full items-center justify-between px-4 py-2.5 text-left text-sm transition"
            >
              <span [class]="selectedOption()?.value === option.value ? 'font-semibold text-slate-900' : 'text-slate-700'">
                {{ option.label }}
              </span>
              
              @if (selectedOption()?.value === option.value) {
                <svg class="h-4 w-4 text-amber-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" />
                </svg>
              }
            </button>
          }
        </div>
      </div>
    }
  </div>
</div>
