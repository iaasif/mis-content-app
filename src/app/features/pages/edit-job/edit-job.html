<div class="container">
    <div class="flex items-center gap-x-10">

            <div>Compnay List</div>

        <div class="flex items-center gap-x-4">
            <div>Job Type</div>
            <div class="">
                <app-dropdown-component [options]="position()" class="w-2xl"></app-dropdown-component>
            </div>
        </div>

        <div class="flex items-center gap-x-4">
            <div>From Date</div>
            <ngxsmk-datepicker mode="single" [showRanges]="true" [value]="FromDate()"
                (valueChange)="FromDate.set($event)"></ngxsmk-datepicker>
        </div>

        <div class="flex items-center gap-x-4">
            <div>To Date</div>
            <ngxsmk-datepicker mode="single" [showRanges]="true" [value]="ToDate()"

        </div>
    </div>
