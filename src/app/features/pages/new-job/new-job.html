<div class="rounded-2xl border border-amber-200 bg-white/90 shadow-sm backdrop-blur">
  <!-- Header -->
  <div class="flex items-start justify-between gap-4 border-b border-amber-200 px-6 py-4">
    <div>
      <div class="flex items-center gap-2">
        <span class="h-2.5 w-2.5 rounded-full bg-amber-500"></span>
        <h3 class="text-xl font-semibold tracking-wide text-slate-900">Add New Hot Job</h3>
      </div>
      <p class="mt-1 text-xs text-slate-600">Add or edit hot job listings</p>
    </div>
    <div class="flex gap-2">
      <button [routerLink]="'/add-company'" type="button" class="cursor-pointer rounded-lg border border-emerald-200 bg-emerald-50 px-4 py-2 text-lg font-semibold text-emerald-700 transition hover:bg-emerald-100">
        Add Company
      </button>
      <button [routerLink]="'/edit'" type="button" class="cursor-pointer rounded-lg border border-blue-200 bg-blue-50 px-4 py-2 text-lg font-semibold text-blue-700 transition hover:bg-blue-100">
        Edit
      </button>
      <button [routerLink]="'/delete'" type="button" class="cursor-pointer rounded-lg border border-red-200 bg-red-50 px-4 py-2 text-lg font-semibold text-red-700 transition hover:bg-red-100">
        Delete Company
      </button>
    </div>
  </div>

  <!-- Form Content -->
  <form [formGroup]="newHotJobForm" (ngSubmit)="submit()">
  <div class="space-y-5 p-6">
    <!-- Company Name -->
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-[200px_1fr] sm:items-center">
      <label class="text-lg font-semibold text-slate-700">Company Name</label>
      <app-input
        [type]="'text'"
        [control]="newHotJobForm.controls.companyName"
        [isNumericOnly]="false">
      </app-input>
    </div>

    <!-- Show Company Name As -->
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-[200px_1fr] sm:items-center">
      <label class="text-lg font-semibold text-slate-700">Show Company Name As</label>
      <app-input
        [type]="'text'"
        [control]="newHotJobForm.controls.showCompanyNameAs"
        [isNumericOnly]="false">
      </app-input>
    </div>

    <!-- Company Name (Bengali) -->
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-[200px_1fr] sm:items-center">
      <label class="text-lg font-semibold text-slate-700">কোম্পানির নাম</label>
      <app-input
        [type]="'text'"
        [control]="newHotJobForm.controls.companyNameBn"
        [isNumericOnly]="false">
      </app-input>
    </div>

    <div class="border-t border-slate-200 pt-5"></div>

    <!-- Job Title -->
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-[200px_1fr] sm:items-center">
      <label class="text-lg font-semibold text-slate-700">Job Title</label>
      <app-input
        [type]="'text'"
        [control]="newHotJobForm.controls.jobTitle"
        [isNumericOnly]="false">
      </app-input>
    </div>

    <!-- Job Title (Bengali) -->
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-[200px_1fr] sm:items-center">
      <label class="text-lg font-semibold text-slate-700">চাকরির শিরনাম</label>
      <app-input
        [type]="'text'"
        [control]="newHotJobForm.controls.jobTitleBn"
        [isNumericOnly]="false">
      </app-input>
    </div>

    <div class="border-t border-slate-200 pt-5"></div>

    <!-- Hot Jobs URL -->
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-[200px_1fr] sm:items-center">
      <label class="text-lg font-semibold text-slate-700">Hot Jobs URL</label>
      <app-input
        [type]="'text'"
        [control]="newHotJobForm.controls.hotJobsUrl"
        [isNumericOnly]="false">
      </app-input>
    </div>

    <!-- Comments -->
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-[200px_1fr] sm:items-center">
      <label class="text-lg font-semibold text-slate-700">Comments</label>
      <app-input
        [type]="'text'"
        [control]="newHotJobForm.controls.comments"
        [isNumericOnly]="false">
      </app-input>
    </div>

    <!-- Category Job IDs -->
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-[200px_1fr] sm:items-start">
      <label class="text-lg font-semibold text-slate-700 sm:pt-2">Category Job IDs</label>
      <div class="space-y-1">
        <app-input
          [type]="'text'"
          [control]="newHotJobForm.controls.categoryJobIds"
          [isNumericOnly]="false">
        </app-input>
        <p class="text-xs text-slate-500">Separate multiple IDs with commas</p>
      </div>
    </div>

    <div class="border-t border-slate-200 pt-5"></div>

    <!-- Display Logo -->
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-[200px_1fr] sm:items-center">
      <label class="text-lg font-semibold text-slate-700">Display Logo?</label>
      <app-radio
        [control]="newHotJobForm.controls.displayLogo"
        [groupName]="'displayLogo'">
      </app-radio>
    </div>

    <!-- Select company logo -->
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-[200px_1fr] sm:items-center">
      <label class="text-lg font-semibold text-slate-700">Select company logo</label>
      <app-input
        [type]="'text'"
        [control]="newHotJobForm.controls.companyLogoId"
        [isNumericOnly]="true">
      </app-input>
    </div>

    <!-- Number of Jobs -->
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-[200px_1fr] sm:items-center">
      <label class="text-lg font-semibold text-slate-700">Number of Jobs</label>
      <app-input
        [type]="'text'"
        [control]="newHotJobForm.controls.numberOfJobs"
        [isNumericOnly]="true">
      </app-input>
    </div>

    <!-- Hot-Job Type -->
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-[200px_1fr] sm:items-center">
      <label class="text-lg font-semibold text-slate-700">Hot-Job Type</label>
      <app-radio
        [control]="newHotJobForm.controls.hotJobsType"
        [groupName]="'hotJobsType'"
        [radioItems]="hotJobsType()">
      </app-radio>
    </div>

    <!-- Hot-Job Category -->
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-[200px_1fr] sm:items-center">
      <label class="text-lg font-semibold text-slate-700">Hot-Job Category</label>
      <app-checkbox-new
        [checkboxItems]="hotJobCategory()">
      </app-checkbox-new>
    </div>

    <!-- Display Position -->
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-[200px_1fr] sm:items-center">
      <label class="text-lg font-semibold text-slate-700">Display Position</label>
      <app-dropdown-component
        class="w-2xl"
        [options]="position()">
      </app-dropdown-component>
    </div>

    <div class="border-t border-slate-200 pt-5"></div>

    <!-- Published Date -->
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-[200px_1fr] sm:items-center">
      <label class="text-lg font-semibold text-slate-700">Published Date</label>
      <app-input
        [type]="'text'"
        [control]="newHotJobForm.controls.publishedDate"
        [isNumericOnly]="false">
      </app-input>
    </div>

    <!-- Job Deadline -->
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-[200px_1fr] sm:items-center">
      <label class="text-lg font-semibold text-slate-700">Job Deadline</label>
      <app-input
        [type]="'text'"
        [control]="newHotJobForm.controls.jobDeadline"
        [isNumericOnly]="false">
      </app-input>
    </div>

    <!-- Premium Start Date -->
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-[200px_1fr] sm:items-center">
      <label class="text-lg font-semibold text-slate-700">Premium Start Date</label>
      <ngxsmk-datepicker
        class="w-2xl"
        mode="single"
        [showRanges]="true"
        [value]="FromDate()"
        (valueChange)="onFromDateChange($event)">
      </ngxsmk-datepicker>
    </div>

    <!-- Premium End Date -->
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-[200px_1fr] sm:items-center">
      <label class="text-lg font-semibold text-slate-700">Premium End Date</label>
      <ngxsmk-datepicker
        class="w-2xl"
        mode="single"
        [showRanges]="true"
        [value]="ToDate()"
        (valueChange)="onToDateChange($event)">
      </ngxsmk-datepicker>
    </div>

    <div class="border-t border-slate-200 pt-5"></div>

    <!-- Posted By -->
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-[200px_1fr] sm:items-center">
      <label class="text-lg font-semibold text-slate-700">Posted By</label>
      <app-input
        [type]="'text'"
        [control]="newHotJobForm.controls.postedBy"
        [isNumericOnly]="false">
      </app-input>
    </div>

    <!-- Source Person -->
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-[200px_1fr] sm:items-center">
      <label class="text-lg font-semibold text-slate-700">Source Person</label>
      <app-input
        [type]="'text'"
        [control]="newHotJobForm.controls.sourcePerson"
        [isNumericOnly]="false">
      </app-input>
    </div>

    <!-- Inline Submit/Reset Buttons (Inside Form) -->
    <div class="pt-4 flex gap-3">
      <button type="submit" class="rounded-md bg-slate-900 px-4 py-2 text-white hover:bg-slate-800 transition">
        Save
      </button>

      <button type="button" (click)="newHotJobForm.reset()" class="rounded-md border px-4 py-2 hover:bg-slate-50 transition">
        Reset
      </button>
    </div>
  </div>
</form>

  <!-- Footer Actions -->
  <div class="flex justify-end gap-3 border-t border-amber-200 bg-slate-50/50 px-6 py-4">
    <button type="button" class="rounded-lg border border-slate-300 bg-white px-5 py-2 text-lg font-semibold text-slate-700 transition hover:bg-slate-50">
      Cancel
    </button>
    <button type="button" (click)="submit()" [disabled]="!newHotJobForm.valid" class="rounded-lg border border-amber-500 bg-amber-500 px-5 py-2 text-lg font-semibold text-white transition hover:bg-amber-600 disabled:opacity-50 disabled:cursor-not-allowed">
      Save Changes
    </button>
  </div>
</div>
