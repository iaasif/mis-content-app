<div class="rounded-2xl border border-amber-200 bg-white shadow-sm backdrop-blur max-w-3xl mx-auto">
  <!-- Header -->
  <div class="flex items-start justify-between gap-4 border-b border-amber-200 px-3 py-2">
    <div>
      <div class="flex items-center gap-2">
        <span class="h-2.5 w-2.5 rounded-full bg-amber-500"></span>
        <h3 class="text-sm font-semibold tracking-wide text-slate-900">Edit Tender</h3>
      </div>
      <p class="mt-1 text-xs text-slate-600">Edit tender listings</p>
    </div>
    <div class="flex gap-2">
      <button [routerLink]="'/add-company'" type="button"
        class="cursor-pointer rounded-lg border border-emerald-200 bg-emerald-50 px-2 py-1 text-xs font-semibold text-emerald-700 transition hover:bg-emerald-100">
        Add Company
      </button>
      <button [routerLink]="'/search-for-edit-tender'" type="button"
        class="cursor-pointer rounded-lg border border-blue-200 bg-blue-50 px-2 py-1 text-xs font-semibold text-blue-700 transition hover:bg-blue-100">
        Edit
      </button>
      <button [routerLink]="'/delete-company'" type="button"
        class="cursor-pointer rounded-lg border border-red-200 bg-red-50 px-2 py-1 text-xs font-semibold text-red-700 transition hover:bg-red-100">
        Delete Company
      </button>
    </div>
  </div>

  <!-- Form Content -->
  <form [formGroup]="editTenderForm" (ngSubmit)="submit()">
    <div class="flex flex-col gap-2 p-2 border border-slate-300 rounded-md">
      <!-- Company Name -->
      <div class="grid grid-cols-[30%_70%] items-center border-2 border-slate-200 rounded-lg p-1">
        <label class="text-xs font-semibold text-slate-700 text-center">Company Name</label>
        <div class="text-xl font-semibold text-slate-900">
          {{ editTenderForm.controls.companyName.value }}
        </div>
      </div>

      <!-- Show Company Name As -->
      <div class="grid grid-cols-[30%_70%] items-center border-2 border-slate-200 rounded-lg p-1">
        <label class="text-xs font-semibold text-slate-700 text-center">Show Company Name As</label>
        <app-input [type]="'text'" [isRequired]="true" [control]="editTenderForm.controls.showCompanyNameAs"
          [isNumericOnly]="false">
        </app-input>
      </div>

      <!-- Company Name (Bangla) -->
      <div class="grid grid-cols-[30%_70%] items-center border-2 border-slate-200 rounded-lg p-1">
        <label class="text-xs font-semibold text-slate-700 text-center">Company Name (Bangla)</label>
        <app-input [type]="'text'" [control]="editTenderForm.controls.companyNameBn" [isNumericOnly]="false">
        </app-input>
      </div>

      <!-- Tender Title -->
      <div class="grid grid-cols-[30%_70%] items-center border-2 border-slate-200 rounded-lg p-1">
        <label class="text-xs font-semibold text-slate-700 text-center">Tender Title</label>
        <app-input [type]="'textarea'" [isRequired]="true" [control]="editTenderForm.controls.tenderTitle"
          [isNumericOnly]="false">
        </app-input>
      </div>

      <!-- Tender URL -->
      <div class="grid grid-cols-[30%_70%] items-center border-2 border-slate-200 rounded-lg p-1">
        <label class="text-xs font-semibold text-slate-700 text-center">Tender URL</label>
        <app-input [type]="'textarea'" [isRequired]="true" [control]="editTenderForm.controls.tenderUrl"
          [isNumericOnly]="false">
        </app-input>
      </div>

      <!-- Comments -->
      <div class="grid grid-cols-[30%_70%] items-center border-2 border-slate-200 rounded-lg p-1">
        <label class="text-xs font-semibold text-slate-700 text-center">Comments</label>
        <app-input [type]="'textarea'" [control]="editTenderForm.controls.comments" [isNumericOnly]="false">
        </app-input>
      </div>

      <!-- Category Tender IDs -->
      <div class="grid grid-cols-[30%_70%] items-center border border-slate-200 rounded-lg p-1">
        <label class="text-xs font-semibold text-slate-700 text-center sm:pt-2">Category Tender IDs</label>
        <div class="space-y-1">
          <app-input [type]="'text'" [isRequired]="true" [control]="editTenderForm.controls.categoryTenderIds"
            [isNumericOnly]="false">
          </app-input>
          <p class="text-xs text-slate-500">Separate multiple IDs with commas</p>
        </div>
      </div>

      <!-- Display Logo and Number of Tenders -->
      <div class="grid grid-cols-[50%_50%] items-center px-20 border border-slate-200 rounded-lg p-1">
        <div>
          <label class="text-xs font-semibold text-slate-700 text-center">Display Logo?</label>
          <app-radio [control]="editTenderForm.controls.displayLogo" [groupName]="'displayLogo'"
            [radioItems]="displayLogoOptions()">
          </app-radio>
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-700 text-center">No of Tender(s)</label>
          <app-input [type]="'text'" [isRequired]="true" [control]="editTenderForm.controls.numberOfTenders"
            [isNumericOnly]="true">
          </app-input>
        </div>
      </div>

      <!-- Select company logo -->
      <div
        class="grid grid-cols-1 gap-1 sm:grid-cols-[30%_70%] sm:gap-x-0 sm:items-start border border-slate-200 rounded-lg p-1">
        <label class="text-xs font-semibold text-slate-700 text-center">Select company logo</label>

        <div class="flex flex-wrap gap-3">
          @if (companyLogoData().length) {
          @for (logo of companyLogoData(); track $index) {
          <button type="button" class="rounded-lg border p-2 transition"
            [class.border-blue-500]="editTenderForm.controls.companyLogoId.value === logo"
            [class.ring-4]="editTenderForm.controls.companyLogoId.value === logo"
            [class.ring-blue-300]="editTenderForm.controls.companyLogoId.value === logo"
            (click)="editTenderForm.controls.companyLogoId.setValue(logo)">
            <img [src]="logo" alt="Company Logo" class="h-8 w-8 object-contain" />
          </button>
          }
          }
        </div>
      </div>

      <!-- Tender Type and Category -->
      <div class="grid grid-cols-[50%_50%] items-center px-20">
        <div>
          <label class="text-xs font-semibold text-slate-700">Tender Type</label>
          <app-radio [control]="editTenderForm.controls.tenderType" [groupName]="'tenderType'"
            [radioItems]="tenderType()">
          </app-radio>
        </div>

        <div>
          <label class="text-xs font-semibold text-slate-700">Tender Category</label>
          <app-checkbox-new [checkboxItems]="tenderCategory()" [(control)]="editTenderForm.controls.tenderCategories">
          </app-checkbox-new>
        </div>
      </div>

      <!-- Published Date and Tender Deadline -->
      <div class="grid grid-cols-[50%_50%] items-center px-20 gap-x-8">
        <div>
          <label class="text-xs font-semibold text-slate-700 text-center">Published Date</label>
          <ngxsmk-datepicker class="w-full" mode="single" [showRanges]="true" [value]="publishedDate()"
            (valueChange)="onPublishedDateChange($event)">
          </ngxsmk-datepicker>
        </div>
        <div>
          <label class="text-xs font-semibold text-slate-700 text-center">Tender Deadline</label>
          <ngxsmk-datepicker class="w-full" mode="single" [showRanges]="true" [value]="deadline()"
            (valueChange)="onTenderDeadlineChange($event)">
          </ngxsmk-datepicker>
        </div>
      </div>

      <!-- Display Position -->
      <div class="grid grid-cols-[30%_70%] items-center">
        <label class="text-xs font-semibold text-slate-700 text-center">Display Position</label>
        <app-dropdown-component class="w-full" [options]="displayPositions()"
          [control]="editTenderForm.controls.displayPosition" [isRequired]="true">
        </app-dropdown-component>
      </div>

      <!-- Posted By -->
      <div class="grid grid-cols-[30%_70%] items-center">
        <label class="text-xs font-semibold text-slate-700 text-center">Posted By</label>
        <app-dropdown-component class="w-full" [options]="postedBy()" [control]="editTenderForm.controls.postedBy"
          [isRequired]="true">
        </app-dropdown-component>
      </div>

      <!-- Source Person -->
      <div class="grid grid-cols-[30%_70%] items-center">
        <label class="text-xs font-semibold text-slate-700 text-center">Source Person</label>
        <app-dropdown-component class="w-full" [options]="sourcePerson()"
          [control]="editTenderForm.controls.sourcePerson" [isRequired]="true">
        </app-dropdown-component>
      </div>
    </div>
  </form>

  <!-- Footer Actions -->
  <div class="flex justify-end gap-3 border-t border-amber-200 bg-slate-50/50 px-6 py-4">
    <button type="button" [routerLink]="'/search-for-edit-tender'"
      class="rounded-lg border border-slate-300 bg-white px-5 py-2 text-xs font-semibold text-slate-700 transition hover:bg-slate-50">
      Cancel
    </button>
    <button type="button" (click)="submit()"
      class="rounded-lg border border-amber-500 bg-amber-500 px-5 py-2 text-xs font-semibold text-white transition hover:bg-amber-600 disabled:opacity-50 disabled:cursor-not-allowed">
      Save Changes
    </button>
  </div>
</div>
