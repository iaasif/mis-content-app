<div class="min-h-screen bg-[linear-gradient(180deg,_#fffaf2_0%,_#f6efe7_45%,_#ffffff_100%)]">
  <div class="mx-auto max-w-6xl px-4 sm:px-6 lg:px-8">
    <div class="pt-10">
      <div class="flex flex-col gap-6 lg:flex-row lg:items-center lg:justify-between">
        <div class="flex items-center gap-4">
          <img class="h-14 w-auto" src="images/bdjobsLogo.svg" alt="Bdjobs logo">
          <div class="text-xs font-semibold uppercase tracking-[0.35em] text-slate-500">MIS Dashboard</div>
        </div>
        <div class="inline-flex flex-wrap items-center gap-2 rounded-full border border-amber-200 bg-white/80 px-4 py-2 text-sm font-semibold text-slate-700 shadow-sm">
          <span class="h-2 w-2 rounded-full bg-amber-500"></span>
          Hot Job / Tender Manager
          <span class="text-red-700">( &commat; bdjobs.com )</span>
        </div>
      </div>

      <div class="mt-6 rounded-2xl border border-amber-200 bg-white/90 p-6 shadow-sm">
        <h1 class="text-2xl font-bold text-slate-900 sm:text-3xl">Daily highlights for hiring and procurement</h1>
        <p class="mt-2 text-sm text-slate-600">Stay on top of fresh postings with a quick, scannable view.</p>
      </div>
    </div>

    <div class="mt-10 grid grid-cols-1 gap-6 pb-12 lg:grid-cols-2">
      <app-hot-jobs-and-tender
        title="Hot Jobs"
        [items]="hotJobs"
        hoverBg="hover:bg-[#fff1f0]"
        bgColor="bg-white/80"
        titleBg="bg-[#ff7a6c]"
        borderColor="border-[#ffb0a8]"
      >
      </app-hot-jobs-and-tender>

      <app-hot-jobs-and-tender
        title="Tenders"
        [items]="tenders"
        hoverBg="hover:bg-[#eef7e6]"
        titleBg="bg-[#5f9b4d]"
        bgColor="bg-white/80"
        borderColor="border-[#a3c58e]"
      ></app-hot-jobs-and-tender>
    </div>
  </div>
</div>
