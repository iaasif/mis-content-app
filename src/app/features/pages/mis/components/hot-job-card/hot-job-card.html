<div class="w-[380px] max-w-full">
    <div
      class="group relative overflow-hidden rounded-2xl border border-slate-200 bg-white p-5 shadow-sm transition-all duration-300 hover:-translate-y-0.5 hover:shadow-lg"
    >
      <div
        class="absolute inset-x-0 top-0 h-1 bg-gradient-to-r from-cyan-500 via-blue-500 to-indigo-500"
      ></div>
  
      <div class="flex flex-col gap-5">
        <div class="flex gap-4">
          <!-- Logo -->
          <div class="shrink-0">
            <div
              class="flex h-14 w-14 items-center justify-center rounded-xl border border-slate-200 bg-slate-50 p-2"
            >
              <img
                [src]="job.logo"
                [alt]="job.company + ' logo'"
                class="max-h-full max-w-full object-contain"
              />
            </div>
          </div>
  
          <!-- Company + roles -->
          <div class="min-w-0 flex-1">
            <h3
              class="line-clamp-2 text-base font-semibold text-slate-900"
            >
              {{ job.company }}
            </h3>
  
            <div class="mt-2 flex flex-wrap gap-1.5">
              @for (role of job.roles; track role) {
              <span
                class="inline-flex items-center rounded-full bg-orange-50 px-2.5 py-0.5 text-xs font-medium text-orange-700 ring-1 ring-orange-200"
              >
                {{ role }}
              </span>
              }
            </div>
          </div>
        </div>
  
        <!-- Dates -->
        <div class="grid grid-cols-2 gap-2">
          <div class="rounded-lg bg-slate-50 px-3 py-2">
            <p class="text-[10px] uppercase text-slate-500">Published</p>
            <p class="text-xs font-medium text-slate-900">
              {{ job.publishedAt }}
            </p>
          </div>
  
          <div class="rounded-lg bg-rose-50 px-3 py-2">
            <p class="text-[10px] uppercase text-rose-600">Deadline</p>
            <p class="text-xs font-semibold text-rose-700">
              {{ job.deadline }}
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
