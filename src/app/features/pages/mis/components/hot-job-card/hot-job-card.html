<div class="w-[440px] max-w-full cursor-pointer">
  <div
  class="h-[260px] group relative overflow-hidden rounded-2xl border border-slate-200 bg-white p-6 shadow-sm transition-all duration-300 hover:-translate-y-0.5 hover:shadow-lg"
>
    <div
      class="absolute inset-x-0 top-0 h-1 bg-gradient-to-r from-cyan-500 via-blue-500 to-indigo-500"
    ></div>

    <div class="flex h-full flex-col justify-between">
      <div class="flex gap-4">
        <!-- Logo -->
        <div class="shrink-0">
          <div
            class="flex h-16 w-16 items-center justify-center rounded-xl border border-slate-200 bg-slate-50 p-2"
          >
            <img class="max-h-full max-w-full object-contain" [src]="job().jbLogoSource"/>
          </div>
        </div>

        <!-- Company + roles -->
        <div class="min-w-0 flex-1">
          <h3
            class="line-clamp-2 text-sm font-semibold text-slate-900"
          >
            {{ job().companyName }}
          </h3>

          <div class="mt-2 flex flex-col gap-1.5 overflow-hidden">
            @for (jobTitle of job().jobTitleList.slice(0, 2); track $index) {
              <span
                class="inline-flex items-center rounded-sm bg-orange-50 px-2 py-0.5 text-[11px] font-medium text-orange-700 ring-1 ring-orange-200 w-full"
              >
                {{ jobTitle }}
              </span>
            }
            @if (job().jobTitleList.length > 2) {
              <span
                class="inline-flex items-center rounded-sm bg-gray-50 px-2 py-0.5 text-[11px] font-medium text-gray-600 ring-1 ring-gray-200 w-full"
              >
                +{{ job().jobTitleList.length - 2 }} more
              </span>
            }
          </div>
        </div>
      </div>

      <!-- Dates -->
      <div class="grid grid-cols-2 gap-3">
        <div class="rounded-lg bg-green-50 px-3 py-2.5">
          <p class="text-[9px] uppercase text-green-600">Published</p>
          <p class="text-[11px] font-medium text-green-700">
            {{ job().postedOn | date:'mediumDate' }}
          </p>
        </div>

        <div class="rounded-lg bg-rose-50 px-3 py-2.5">
          <p class="text-[9px] uppercase text-rose-600">Deadline</p>
          <p class="text-[11px] font-semibold text-rose-700">
            {{ job().endDate | date:'mediumDate' }}
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
