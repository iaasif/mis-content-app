<div class="flex justify-around w-full mt-4 gap-4 border border-blue-800 p-10">

    <div class="w-1/2 border border-blue-800 rounded-lg p-3">
        <app-file-upload
            [uploadFileType]="uploadFileType.image"
            [uploadIcon]="'images/img-upload.png'"
            [uploadTitle]="'Image upload'"
            [maxHeight]="20000"
            [maxWidth]="20000"
            [payload]="imagePayload"
            (response)="onImageResponse($event)"
            [imgUrl]="imageApiUrl"
        />
        @if (storeDataService.imgUrls().length > 0) {
            @for (link of storeDataService.imgUrls(); track $index) {
                <div class="py-1 mt-2">
                    <app-text-filed [data]="link" />
                </div>
            }
        }
    </div>
    <div class="w-1/2 border border-blue-800 rounded-lg p-3">
        <app-file-upload
            [uploadFileType]="uploadFileType.html"
            [uploadIcon]="'images/html-up.png'"
            [uploadTitle]="'HTML upload'"
            [maxHeight]="20000"
            [maxWidth]="20000"
            [payload]="htmlPayload"
            (responseHtmlUp)="onHtmlResponse($event)"
            [htmlUrl]="htmlApiUrl"
        />
        @if (storeDataService.htmlUrls(); as res) {
            @for (link of res; track $index) {
                <div class="py-1 mt-2">
                    <app-text-filed [data]="link" />
                </div>
            }
        }
    </div>
</div>
